# Codecov configuration (#555)
#
# Server-side coverage gates layered on top of the hard --fail-under check
# enforced locally in .github/workflows/coverage.yml.
coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        # Overall project coverage must stay at or above 70%.
        target: 70%
        threshold: 1%
    patch:
      default:
        # New / changed lines in a PR must be at least 80% covered.
        target: 80%
        threshold: 1%

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false

ignore:
  - "**/tests/**"
  - "**/*_tests.rs"
  - "fuzz/**"
