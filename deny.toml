# cargo-deny configuration (#553, #554)
#
# Drives the security and dependency scanning in
# .github/workflows/security.yml and .github/workflows/dependency-scan.yml.
#
# Run locally:
#   cargo install cargo-deny --locked
#   cargo deny check

[graph]
# Only check the targets we actually ship / test on.
targets = [
    { triple = "wasm32-unknown-unknown" },
    { triple = "x86_64-unknown-linux-gnu" },
]
all-features = true

[output]
feature-depth = 1

# ---------------------------------------------------------------------------
# Security advisories (RustSec) — see #554
# ---------------------------------------------------------------------------
[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
# Fail the build on any vulnerability or unmaintained crate that has not been
# explicitly triaged below.
yanked = "deny"
ignore = [
    # Add advisory IDs here once triaged, e.g.:
    # "RUSTSEC-2023-0001",
]

# ---------------------------------------------------------------------------
# License policy
# ---------------------------------------------------------------------------
[licenses]
# Permissive licenses we accept across the dependency tree.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.8
# Workspace crates have no published license; skip them so the policy only
# governs third-party dependencies.
[[licenses.exceptions]]
name = "ip_registry"
allow = ["MIT", "Apache-2.0"]
[[licenses.exceptions]]
name = "atomic_swap"
allow = ["MIT", "Apache-2.0"]

# ---------------------------------------------------------------------------
# Banned / duplicate dependencies
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcard-dependencies = "warn"
# Crates that must never enter the dependency tree.
deny = [
    # { name = "openssl", reason = "use rustls" },
]
skip = []
skip-tree = []

# ---------------------------------------------------------------------------
# Source / registry policy — only allow crates.io and trusted git sources
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
